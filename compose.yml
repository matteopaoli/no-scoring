services:
  postgres:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d 
    restart: unless-stopped

  web:
    image: web
    container_name: web
    build:
      context: ./clients/web/
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./clients/web:/app:delegated  # Mount project directory
    env_file:
      - ./clients/web/.env
volumes:
  postgres_data:

  
